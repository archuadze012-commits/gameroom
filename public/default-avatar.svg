<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0d1f35"/>
      <stop offset="100%" stop-color="#060c14"/>
    </radialGradient>
    <radialGradient id="glowCenter" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="b1"/>
      <feGaussianBlur stdDeviation="5" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b1"/>
      <feGaussianBlur stdDeviation="8" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="circ"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="100" fill="url(#glowCenter)"/>

  <g clip-path="url(#circ)">
    <!-- Dot grid -->
    <g fill="#00e5ff" opacity="0.07">
      <circle cx="25" cy="25" r="1"/><circle cx="50" cy="25" r="1"/><circle cx="75" cy="25" r="1"/><circle cx="100" cy="25" r="1"/><circle cx="125" cy="25" r="1"/><circle cx="150" cy="25" r="1"/><circle cx="175" cy="25" r="1"/>
      <circle cx="25" cy="50" r="1"/><circle cx="50" cy="50" r="1"/><circle cx="75" cy="50" r="1"/><circle cx="100" cy="50" r="1"/><circle cx="125" cy="50" r="1"/><circle cx="150" cy="50" r="1"/><circle cx="175" cy="50" r="1"/>
      <circle cx="25" cy="75" r="1"/><circle cx="50" cy="75" r="1"/><circle cx="75" cy="75" r="1"/><circle cx="100" cy="75" r="1"/><circle cx="125" cy="75" r="1"/><circle cx="150" cy="75" r="1"/><circle cx="175" cy="75" r="1"/>
      <circle cx="25" cy="100" r="1"/><circle cx="50" cy="100" r="1"/><circle cx="75" cy="100" r="1"/><circle cx="125" cy="100" r="1"/><circle cx="150" cy="100" r="1"/><circle cx="175" cy="100" r="1"/>
      <circle cx="25" cy="125" r="1"/><circle cx="50" cy="125" r="1"/><circle cx="75" cy="125" r="1"/><circle cx="100" cy="125" r="1"/><circle cx="125" cy="125" r="1"/><circle cx="150" cy="125" r="1"/><circle cx="175" cy="125" r="1"/>
      <circle cx="25" cy="150" r="1"/><circle cx="50" cy="150" r="1"/><circle cx="75" cy="150" r="1"/><circle cx="100" cy="150" r="1"/><circle cx="125" cy="150" r="1"/><circle cx="150" cy="150" r="1"/><circle cx="175" cy="150" r="1"/>
      <circle cx="25" cy="175" r="1"/><circle cx="50" cy="175" r="1"/><circle cx="75" cy="175" r="1"/><circle cx="100" cy="175" r="1"/><circle cx="125" cy="175" r="1"/><circle cx="150" cy="175" r="1"/><circle cx="175" cy="175" r="1"/>
    </g>

    <!-- Silhouette body fill (dark, behind glowing strokes) -->
    <path d="M55 210 C55 168 72 150 100 147 C128 150 145 168 145 210 Z" fill="#071828"/>
    <circle cx="100" cy="103" r="31" fill="#071828"/>

    <!-- Body outline — neon -->
    <path d="M55 210 C55 168 72 150 100 147 C128 150 145 168 145 210 Z"
          fill="none" stroke="#00e5ff" stroke-width="1.4" filter="url(#glow)" opacity="0.9"/>

    <!-- Chest circuit lines -->
    <g stroke="#00e5ff" stroke-width="0.7" opacity="0.35" stroke-linecap="round">
      <line x1="88" y1="162" x2="88" y2="175"/>
      <line x1="88" y1="168" x2="82" y2="168"/>
      <line x1="112" y1="162" x2="112" y2="175"/>
      <line x1="112" y1="168" x2="118" y2="168"/>
      <line x1="95" y1="156" x2="105" y2="156"/>
      <circle cx="88" cy="168" r="1.5" fill="#00e5ff"/>
      <circle cx="112" cy="168" r="1.5" fill="#00e5ff"/>
    </g>

    <!-- Head outline — neon -->
    <circle cx="100" cy="103" r="31"
            fill="none" stroke="#00e5ff" stroke-width="1.4" filter="url(#glow)" opacity="0.9"/>

    <!-- Headset band -->
    <path d="M74 99 Q74 68 100 68 Q126 68 126 99"
          fill="none" stroke="#00e5ff" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>

    <!-- Left ear cup -->
    <rect x="68" y="92" width="12" height="18" rx="5" fill="#071828" stroke="#00e5ff" stroke-width="1.3" filter="url(#glowSoft)"/>
    <rect x="70.5" y="95" width="7" height="12" rx="2.5" fill="#001a28" stroke="#00e5ff" stroke-width="0.6" opacity="0.8"/>

    <!-- Right ear cup -->
    <rect x="120" y="92" width="12" height="18" rx="5" fill="#071828" stroke="#00e5ff" stroke-width="1.3" filter="url(#glowSoft)"/>
    <rect x="122.5" y="95" width="7" height="12" rx="2.5" fill="#001a28" stroke="#00e5ff" stroke-width="0.6" opacity="0.8"/>

    <!-- Mic arm -->
    <path d="M120 107 Q132 113 134 120" fill="none" stroke="#00e5ff" stroke-width="1.2" stroke-linecap="round" filter="url(#glowSoft)" opacity="0.8"/>
    <!-- Mic dot -->
    <circle cx="134.5" cy="121" r="3" fill="#00e5ff" filter="url(#glowStrong)" opacity="0.9"/>

    <!-- Visor / face screen -->
    <rect x="84" y="97" width="32" height="14" rx="4" fill="#001a28" stroke="#00e5ff" stroke-width="1" filter="url(#glowSoft)"/>
    <!-- Visor scan lines -->
    <line x1="87" y1="102" x2="113" y2="102" stroke="#00e5ff" stroke-width="0.7" opacity="0.55"/>
    <line x1="89" y1="106" x2="111" y2="106" stroke="#00e5ff" stroke-width="0.5" opacity="0.35"/>
    <!-- Visor center dot -->
    <circle cx="100" cy="104" r="1.5" fill="#00e5ff" opacity="0.7" filter="url(#glowSoft)"/>
  </g>

  <!-- Corner brackets -->
  <g stroke="#00e5ff" stroke-width="1.8" stroke-linecap="round" filter="url(#glow)" opacity="0.75">
    <polyline points="22,38 22,22 38,22"/>
    <polyline points="178,38 178,22 162,22"/>
    <polyline points="22,162 22,178 38,178"/>
    <polyline points="178,162 178,178 162,178"/>
  </g>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="97.5" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.5" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="95" fill="none" stroke="#00e5ff" stroke-width="0.4" opacity="0.2"/>

  <!-- Bottom glow base -->
  <ellipse cx="100" cy="199" rx="60" ry="10" fill="#00e5ff" opacity="0.12" filter="url(#glowStrong)"/>
</svg>
