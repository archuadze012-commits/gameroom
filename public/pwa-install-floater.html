<!doctype html>
<html lang="ka">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PWA Install Floater — Demo</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/pwa-install-floater.css" />
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      font-family: Inter, "Noto Sans Georgian", system-ui, sans-serif;
      background:
        radial-gradient(1200px 600px at 80% -10%, rgba(79,140,255,0.18), transparent 60%),
        radial-gradient(900px 500px at -10% 110%, rgba(110,91,255,0.18), transparent 60%),
        #0a0a0b;
      color: #e6e8ee;
      display: grid; place-items: center;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 28px;
      max-width: 520px;
      width: 100%;
    }
    h1 { margin: 0 0 8px; font-size: 22px; }
    p { color: #9099ad; line-height: 1.5; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
    button {
      background: linear-gradient(135deg, #4F8CFF, #6E5BFF);
      color: #fff; border: 0; cursor: pointer;
      padding: 8px 14px; border-radius: 8px;
      font: 500 13px Inter, system-ui, sans-serif;
    }
    button.ghost { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #cbd5e1; }
    code { background: rgba(255,255,255,0.06); padding: 1px 6px; border-radius: 4px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>PWA Install Floater — Demo</h1>
    <p>თითოეული ღილაკი ხელით აიძულებს კონკრეტულ stage-ს. ცოცხალ საიტზე ის თვითონ წყვეტს როდის გამოჩნდეს <code>beforeinstallprompt</code>, <code>display-mode</code> და UA-ის მიხედვით.</p>
    <div class="row">
      <button onclick="PWAInstallFloater.show('install')">Stage 1A — Native install</button>
      <button onclick="PWAInstallFloater.show('fallback')">Stage 1B — Chrome pill fallback</button>
      <button onclick="PWAInstallFloater.show('pin')">Stage 2 — Pin to taskbar</button>
    </div>
    <div class="row">
      <button class="ghost" onclick="PWAInstallFloater.hide()">Hide</button>
      <button class="ghost" onclick="PWAInstallFloater.reset(); alert('cooldown cleared')">Reset cooldown</button>
    </div>
  </div>

  <script src="/pwa-install-floater.js"></script>
  <script>
    // Init without auto-show (delay so big it won't fire during demo).
    PWAInstallFloater.init({ delay: 99999999, locale: "ka" });
    // Optional: register SW so beforeinstallprompt becomes possible.
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").catch(() => {});
    }
  </script>
</body>
</html>
