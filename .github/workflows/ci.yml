name: ci

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  types-lint:
    name: types + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: TypeScript
        run: npx tsc --noEmit -p .
      - name: ESLint
        run: npm run lint

  test:
    name: unit + integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: Unit tests
        run: npm run test:unit
      # Integration tests run against @electric-sql/pglite (in-process Postgres),
      # so no external database or service is required.
      - name: Integration tests
        run: npm run test:integration

  migrations:
    name: migration replay
    runs-on: ubuntu-latest
    # Replays every supabase/migrations/*.sql against an in-process Postgres
    # (pglite, no Docker) to prove the tree builds a database from scratch.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: Replay migrations
        run: npm run test:migrations
      # Audits the replayed catalog for client-reachable privilege: definer
      # functions must pin search_path (incl. pg_temp); no definer/mutating
      # function may be executable by anon/authenticated/PUBLIC; every table with
      # RLS policies must have RLS enabled.
      - name: Security-definer audit
        run: npm run test:security-definer

  build:
    name: next build
    runs-on: ubuntu-latest
    # Build-time public env only — placeholders so module-level reads don't throw.
    # No real secrets: every DB-touching page is `force-dynamic` (runtime-only).
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      NEXT_PUBLIC_SITE_URL: https://playgame.ge
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: placeholder-vapid-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build

  e2e:
    name: e2e smoke (playwright)
    runs-on: ubuntu-latest
    # Fast-refusing Supabase URL — inlined at build time so the app boots as an
    # unauthenticated visitor with no real backend; auth.getUser() fails fast and
    # the smoke exercises boot/routing/render + the /playmanager→login redirect.
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:9999
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: placeholder-vapid-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Build (with fast-fail Supabase URL inlined)
        run: npm run build
      - name: Run smoke suite
        run: npx playwright test e2e/smoke.spec.ts
