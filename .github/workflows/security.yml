name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

permissions:
  contents: read

jobs:
  audit:
    name: npm audit (prod deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      # Production deps are now clean (undici→6.27.0 and lodash→4.18.1 pinned via
      # overrides; the shadcn CLI moved to devDependencies took hono/js-yaml/babel
      # out of the prod tree). Gate at `high` so a new high/critical advisory in a
      # runtime dependency fails CI; the full report below stays for visibility.
      - run: npm audit --omit=dev --audit-level=high
      - name: Full audit report (non-blocking)
        if: always()
        run: npm audit --omit=dev || true

  secrets:
    name: gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: only required for GitHub organizations, free for personal repos.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  codeql:
    name: CodeQL (JS/TS)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3
